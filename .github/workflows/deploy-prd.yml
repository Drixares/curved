name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-prd:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI library
        run: cd packages/ui && bun run build

      - name: Build Web (PRD)
        run: cd packages/web && bun run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PRD }}

      - name: Build Admin (PRD)
        run: cd packages/admin && bun run build

      - name: Build API for Lambda
        run: cd packages/api && bun run build:lambda

      - name: Build Crons for Lambda
        run: cd packages/crons && bun run build:lambda

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-prd
          path: packages/web/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist-prd
          path: packages/admin/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: api-dist-prd
          path: packages/api/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: crons-dist-prd
          path: packages/crons/dist/
          retention-days: 1

  migrate:
    name: Run DB Migrations (PRD)
    runs-on: ubuntu-latest
    needs: build-prd
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get DATABASE_URL from Secrets Manager
        run: |
          DB_URL=$(aws secretsmanager get-secret-value \
            --secret-id ${{ secrets.SECRETS_MANAGER_PRD }} \
            --query 'SecretString' --output text | jq -r '.DATABASE_URL')
          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "::error::Failed to retrieve DATABASE_URL from Secrets Manager"
            exit 1
          fi
          echo "::add-mask::${DB_URL}"
          echo "DATABASE_URL=${DB_URL}" >> $GITHUB_ENV

      - name: Run migrations
        run: cd packages/api && bunx drizzle-kit migrate

  deploy-api:
    name: Deploy API to Lambda (PRD)
    runs-on: ubuntu-latest
    needs: [build-prd, migrate]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-dist-prd
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda
        run: cd dist && zip -r ../lambda.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_API_PRD }} \
            --zip-file fileb://lambda.zip

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_API_PRD }}

  deploy-web:
    name: Deploy Web to S3 (PRD)
    runs-on: ubuntu-latest
    needs: build-prd
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-prd
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_WEB_PRD }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_WEB_PRD }} \
            --paths "/*"

  deploy-admin:
    name: Deploy Admin to S3 (PRD)
    runs-on: ubuntu-latest
    needs: build-prd
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist-prd
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_ADMIN_PRD }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ADMIN_PRD }} \
            --paths "/*"

  deploy-crons:
    name: Deploy Crons to Lambda (PRD)
    runs-on: ubuntu-latest
    needs: build-prd
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: crons-dist-prd
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda
        run: cd dist && zip -r ../lambda.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_CRON_PRD }} \
            --zip-file fileb://lambda.zip

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_CRON_PRD }}

  deploy-assets:
    name: Deploy Assets to S3 (PRD)
    runs-on: ubuntu-latest
    needs: build-prd
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync assets to S3
        run: aws s3 sync assets/ s3://${{ secrets.S3_BUCKET_ASSETS_PRD }} --delete
