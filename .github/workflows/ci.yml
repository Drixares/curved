name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run checks

      - name: Type check API
        run: cd packages/api && bunx tsc --noEmit

      - name: Type check Web
        run: cd packages/web && bunx tsc -b

      - name: Type check Admin
        run: cd packages/admin && bunx tsc -b

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI library
        run: cd packages/ui && bun run build

      - name: Build Web
        run: cd packages/web && bun run build
        env:
          VITE_API_URL: https://api-stg.curved.app

      - name: Build Admin
        run: cd packages/admin && bun run build

      - name: Build API for Lambda
        run: cd packages/api && bun run build:lambda

      - name: Build Crons for Lambda
        run: cd packages/crons && bun run build:lambda

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: packages/admin/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: packages/api/dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: crons-dist
          path: packages/crons/dist/
          retention-days: 1
